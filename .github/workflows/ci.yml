name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest httpx "pydantic>=2" \
                                python-multipart "websockets>=12" ruff
          # Parity gate spawns a STOCK FastAPI subprocess via
          # ``FASTAPI_TURBO_NO_SHIM=1; import uvicorn; from
          # parity_app import app`` (see tests/parity/conftest.py).
          # The shim-disabled subprocess needs the real upstream
          # FastAPI + uvicorn installed alongside fastapi-turbo —
          # without these, fresh CI runners fail at parity-process
          # startup before any parity assertion runs.
          python -m pip install "fastapi==0.136.0" "uvicorn[standard]>=0.30"
      - name: Build extension (release)
        run: maturin develop --release
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo test
        run: cargo test --release
      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets --release -- -D warnings
      - name: ruff check
        run: ruff check python/ tests/
      - name: pytest (fast subset)
        run: pytest tests/ -x -q --ignore=tests/test_websocket.py --ignore=tests/parity
      - name: pytest stress suite
        run: pytest tests/stress -x -q
      - name: pytest WebSocket
        run: pytest tests/test_websocket.py -x -q
      - name: pytest parity (real-loopback, FastAPI 0.136.0 diff)
        # Release-required gate per COMPATIBILITY.md "Release
        # readiness" section: parity tests spawn upstream FastAPI
        # AND turbo as subprocess servers on real loopback ports
        # and diff the responses across 16 parity apps. Skipping
        # these is what let the R26-found Sentry legacy regression
        # ship undetected — moved from skip-by-default to required.
        run: pytest tests/parity -x -q
      - name: Upstream FastAPI test suite under shim
        # Run upstream FastAPI's own ~3K-test suite against
        # ``import fastapi_turbo`` (sys.modules shim). COMPATIBILITY
        # claims 3,125 / 3,129 — failures here mean the claim
        # drifted. Pinned to FastAPI 0.136.0; gate is BLOCKING.
        #
        # The shim must be installed inside the pytest process — a
        # ``python -c "import fastapi_turbo"`` step in a separate
        # process leaves the main pytest run unmodified. We write a
        # ``conftest.py`` into the upstream test root that imports
        # ``fastapi_turbo`` at session-start, so every test fixture
        # / collection sees the shim.
        #
        # Reused-runner safety: if the cache directory exists from a
        # previous run on a different pin, force-fetch and reset to
        # the pinned tag so we never silently test against a stale
        # checkout. Earlier ``[ ! -d ... ]`` short-circuited the
        # clone and inherited whatever the cache had — invisible
        # version drift on every reused runner.
        run: |
          UPSTREAM_TAG=0.136.0
          if [ ! -d /tmp/fastapi_upstream/.git ]; then
            rm -rf /tmp/fastapi_upstream
            git clone https://github.com/fastapi/fastapi /tmp/fastapi_upstream
          fi
          git -C /tmp/fastapi_upstream fetch --tags --force --depth 1 origin "$UPSTREAM_TAG"
          git -C /tmp/fastapi_upstream reset --hard "$UPSTREAM_TAG"
          git -C /tmp/fastapi_upstream clean -fdx -- ':!conftest.py'
          python -m pip install pytest-asyncio pyyaml dirty-equals \
                                "sqlmodel>=0.0.14" inline-snapshot
          cat > /tmp/fastapi_upstream/conftest.py <<'PY'
          # Auto-injected by fastapi-turbo CI: install the
          # ``from fastapi import ...`` shim into THIS pytest
          # process so upstream tests resolve to fastapi-turbo.
          import fastapi_turbo  # noqa: F401
          PY
          # Run from the upstream root so ``test_tutorial`` cwd-
          # relative asset lookups (``open("docs_src/.../...")``)
          # resolve. Earlier ``--ignore=test_tutorial`` skipped a
          # third of the suite to avoid the cwd-mismatch failures —
          # the canonical 3,125 / 3,129 claim was unenforced. Now
          # the wrapper runs from the upstream root AND the shim
          # conftest above guarantees the shim loads first.
          # Deselect upstream's own skip / xfail decisions (mirror
          # of scripts/run_external_compat_gates.sh): benchmarks
          # require --codspeed, pydantic-v1 module skipped on py3.14+,
          # tutorial006c is upstream's own xfail per fastapi#12419.
          cd /tmp/fastapi_upstream && pytest tests/ -q --tb=no --no-header \
              --ignore=tests/benchmarks/test_general_performance.py \
              --ignore=tests/test_pydantic_v1_error.py \
              --deselect=tests/test_tutorial/test_query_params_str_validations/test_tutorial006c.py
      - name: Sentry SDK FastAPI + ASGI integration
        # Release-required gate, BLOCKING. R26 caught a
        # transaction-name regression here (legacy
        # SentryAsgiMiddleware setup) that would have shipped without
        # this CI step. Pinned to a sentry-python release tag so
        # upstream churn doesn't silently break the gate.
        #
        # Same reused-runner force-reset as the FastAPI gate above,
        # for the same reason. Earlier ``[ ! -d ... ]`` skipped the
        # clone on a runner whose ``/tmp/sentry-python`` was an
        # unrelated version (probe-confirmed: a 2.58.0 checkout was
        # silently used in place of the pinned 2.42.0).
        #
        # Runs BOTH the ``fastapi`` and ``asgi`` integration trees —
        # COMPATIBILITY.md claims 33/33 ASGI + 89/89 FastAPI; gating
        # only ``fastapi`` left the ASGI claim unproven on every CI
        # run.
        run: |
          SENTRY_TAG=2.42.0
          if [ ! -d /tmp/sentry-python/.git ]; then
            rm -rf /tmp/sentry-python
            git clone https://github.com/getsentry/sentry-python /tmp/sentry-python
          fi
          git -C /tmp/sentry-python fetch --tags --force --depth 1 origin "$SENTRY_TAG"
          git -C /tmp/sentry-python reset --hard "$SENTRY_TAG"
          git -C /tmp/sentry-python clean -fdx -- ':!tests/integrations/fastapi/conftest.py' ':!tests/integrations/asgi/conftest.py'
          python -m pip install "sentry-sdk[fastapi]==2.42.0"
          for tree in fastapi asgi; do
            cat > /tmp/sentry-python/tests/integrations/$tree/conftest.py <<'PY'
          # Auto-injected by fastapi-turbo CI: install the shim
          # inside THIS pytest process. Without this, the Sentry
          # tests resolve to upstream FastAPI and the gate is a
          # false positive (it tests upstream, not our code).
          import fastapi_turbo  # noqa: F401
          PY
          done
          pytest /tmp/sentry-python/tests/integrations/fastapi \
                 /tmp/sentry-python/tests/integrations/asgi \
                 -q --tb=short
      - name: Import smoke (shim parity)
        run: |
          python -c "
          import fastapi_turbo
          from fastapi import FastAPI
          from fastapi.testclient import TestClient, AsyncClient, ASGITransport
          app = FastAPI()
          @app.get('/p')
          def p(): return {'ok': True}
          assert TestClient(app).get('/p').json() == {'ok': True}
          print('smoke ok')
          "
