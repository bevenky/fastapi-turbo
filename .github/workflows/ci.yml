name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # pyproject.toml ships ``requires-python = ">=3.10"`` — if
        # we don't run 3.10 in PR CI a regression on the floor
        # version slips to release. Audit R51 finding 3.
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest httpx "pydantic>=2" \
                                python-multipart "websockets>=12" ruff
          # Parity gate spawns a STOCK FastAPI subprocess via
          # ``FASTAPI_TURBO_NO_SHIM=1; import uvicorn; from
          # parity_app import app`` (see tests/parity/conftest.py).
          # The shim-disabled subprocess needs the real upstream
          # FastAPI + uvicorn installed alongside fastapi-turbo —
          # without these, fresh CI runners fail at parity-process
          # startup before any parity assertion runs.
          python -m pip install "fastapi==0.136.0" "uvicorn[standard]>=0.30"
      - name: Build extension (release)
        run: maturin develop --release
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo test
        run: cargo test --release
      - name: cargo clippy -- -D warnings
        run: cargo clippy --all-targets --release -- -D warnings
      - name: ruff check
        run: ruff check python/ tests/
      - name: pytest (fast subset)
        run: pytest tests/ -x -q --ignore=tests/test_websocket.py --ignore=tests/parity
      - name: pytest stress suite
        run: pytest tests/stress -x -q
      - name: pytest WebSocket
        run: pytest tests/test_websocket.py -x -q
      - name: pytest parity (real-loopback, FastAPI 0.136.0 diff)
        # Release-required gate per COMPATIBILITY.md "Release
        # readiness" section: parity tests spawn upstream FastAPI
        # AND turbo as subprocess servers on real loopback ports
        # and diff the responses across 16 parity apps. Skipping
        # these is what let the R26-found Sentry legacy regression
        # ship undetected — moved from skip-by-default to required.
        run: pytest tests/parity -x -q
      - name: Upstream FastAPI + Sentry compat gates (canonical script)
        # Audit R51 finding 5: CI used to inline the same checkout +
        # install + deselect logic that ``scripts/run_external_
        # compat_gates.sh`` already implements canonically. Two
        # copies of the same flow drift over time (R34/R37/R48
        # caught such drift). Delegate to the script so PR CI,
        # release CI, and local audit runs all execute identical
        # gate semantics — including the latest stale-build
        # detection, OFFLINE-scrub, and per-tag force-reset.
        run: ./scripts/run_external_compat_gates.sh all
      - name: Import smoke (shim parity)
        run: |
          python -c "
          import fastapi_turbo
          from fastapi import FastAPI
          from fastapi.testclient import TestClient, AsyncClient, ASGITransport
          app = FastAPI()
          @app.get('/p')
          def p(): return {'ok': True}
          assert TestClient(app).get('/p').json() == {'ok': True}
          print('smoke ok')
          "
