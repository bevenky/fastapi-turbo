# Build and publish pre-compiled wheels for all platforms.
# Users run `pip install fastapi-turbo` — no Rust toolchain needed.
#
# This is the same pattern used by orjson, pydantic-core, and cryptography.
# maturin builds platform-specific wheels containing the compiled .so/.dylib/.pyd.
#
# Triggers: push a git tag like v0.1.0
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Gate: every wheel-build job below depends on this. The gate
  # matrix covers ALL Python versions we ship wheels for (3.10–3.14)
  # so a version-specific regression never sneaks past a "3.14-only"
  # check. Rust fmt / clippy / tests run once (Python-independent) on
  # the 3.14 leg; we suppress the redundant work on the others.
  gate:
    name: Test + lint gate (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest httpx "pydantic>=2" python-multipart \
                                "websockets>=12" ruff
          # Parity gate spawns a STOCK FastAPI subprocess (see
          # tests/parity/conftest.py — uses ``FASTAPI_TURBO_NO_SHIM
          # =1`` + ``import uvicorn``). Real upstream FastAPI +
          # uvicorn must be installed alongside fastapi-turbo so
          # fresh release runners don't fail at parity-process
          # startup. CI runs the same step.
          python -m pip install "fastapi==0.136.0" "uvicorn[standard]>=0.30"
      - name: Build extension (release) + install editable
        run: maturin develop --release
      - name: cargo fmt --check
        if: matrix.python == '3.14'
        run: cargo fmt --check
      - name: cargo test
        if: matrix.python == '3.14'
        run: cargo test --release
      - name: cargo clippy -- -D warnings
        if: matrix.python == '3.14'
        run: cargo clippy --all-targets --release -- -D warnings
      - name: ruff check
        if: matrix.python == '3.14'
        run: ruff check python/ tests/
      - name: pytest (fast subset, no live WebSocket servers)
        run: pytest tests/ -x -q --ignore=tests/test_websocket.py --ignore=tests/parity
      - name: pytest stress suite
        run: pytest tests/stress -x -q
      - name: pytest WebSocket
        # Real-loopback WS protocol tests. Release-required gate per
        # COMPATIBILITY.md: catches handshake / ping-pong / close
        # regressions that the in-process WS path can't reproduce.
        run: pytest tests/test_websocket.py -x -q
      - name: pytest parity (real-loopback, FastAPI 0.136.0 diff)
        # Release-required gate per COMPATIBILITY.md "Release
        # readiness" section. Spawns upstream FastAPI AND turbo as
        # subprocess servers and diffs the responses across 16
        # parity apps. The CI workflow runs this on every PR; the
        # release workflow MUST too — earlier R29 audit caught a
        # tag publish path that bypassed this check.
        run: pytest tests/parity -x -q
      - name: pytest upstream FastAPI suite under shim
        # Release-required: COMPATIBILITY claims 3,125 / 3,129
        # passing under the sys.modules shim. Runs the canonical
        # upstream FastAPI tests against ``import fastapi_turbo``
        # — the wrapper does ``cd /tmp/fastapi_upstream`` so
        # ``test_tutorial`` cwd-relative asset lookups work, and
        # the shim conftest is written into the upstream root so
        # the shim is live in the pytest process.
        if: matrix.python == '3.14'
        run: |
          UPSTREAM_TAG=0.136.0
          if [ ! -d /tmp/fastapi_upstream/.git ]; then
            rm -rf /tmp/fastapi_upstream
            git clone https://github.com/fastapi/fastapi /tmp/fastapi_upstream
          fi
          git -C /tmp/fastapi_upstream fetch --tags --force --depth 1 origin "$UPSTREAM_TAG"
          git -C /tmp/fastapi_upstream reset --hard "$UPSTREAM_TAG"
          git -C /tmp/fastapi_upstream clean -fdx -- ':!conftest.py'
          python -m pip install pytest-asyncio pyyaml dirty-equals \
                                "sqlmodel>=0.0.14" inline-snapshot
          cat > /tmp/fastapi_upstream/conftest.py <<'PY'
          import fastapi_turbo  # noqa: F401
          PY
          # cwd into the upstream root so test_tutorial assets
          # resolve relative to that tree.
          # Deselect upstream's own skip / xfail decisions (mirror
          # of scripts/run_external_compat_gates.sh): benchmarks
          # require --codspeed, pydantic-v1 module skipped on py3.14+,
          # tutorial006c is upstream's own xfail per fastapi#12419.
          cd /tmp/fastapi_upstream && pytest tests/ -q --tb=no --no-header \
              --ignore=tests/benchmarks/test_general_performance.py \
              --ignore=tests/test_pydantic_v1_error.py \
              --deselect=tests/test_tutorial/test_query_params_str_validations/test_tutorial006c.py
      - name: pytest Sentry SDK FastAPI + ASGI integration
        # Release-required: caught the R26 transaction-name
        # regression. Pinned to sentry-python 2.42.0; force-reset
        # to that tag so reused runners can't drift.
        if: matrix.python == '3.14'
        run: |
          SENTRY_TAG=2.42.0
          if [ ! -d /tmp/sentry-python/.git ]; then
            rm -rf /tmp/sentry-python
            git clone https://github.com/getsentry/sentry-python /tmp/sentry-python
          fi
          git -C /tmp/sentry-python fetch --tags --force --depth 1 origin "$SENTRY_TAG"
          git -C /tmp/sentry-python reset --hard "$SENTRY_TAG"
          git -C /tmp/sentry-python clean -fdx -- ':!tests/integrations/fastapi/conftest.py' ':!tests/integrations/asgi/conftest.py'
          python -m pip install "sentry-sdk[fastapi]==2.42.0"
          for tree in fastapi asgi; do
            cat > /tmp/sentry-python/tests/integrations/$tree/conftest.py <<'PY'
          import fastapi_turbo  # noqa: F401
          PY
          done
          pytest /tmp/sentry-python/tests/integrations/fastapi \
                 /tmp/sentry-python/tests/integrations/asgi \
                 -q --tb=short
      - name: Import smoke test (shim parity)
        run: |
          python -c "
          import fastapi_turbo
          from fastapi import FastAPI
          from fastapi.testclient import TestClient, AsyncClient, ASGITransport
          app = FastAPI()
          @app.get('/p')
          def p(): return {'ok': True}
          assert TestClient(app).get('/p').json() == {'ok': True}
          print('smoke ok on py${{ matrix.python }}')
          "

  # ── Build wheels for Linux (x86_64 + aarch64) ──
  linux:
    needs: gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      # Smoke-test the ACTUAL wheel by installing it (not the source
      # tree) and running a TestClient roundtrip. Skip aarch64 cross
      # builds since the runner can't execute the artefact locally.
      - name: Smoke-test wheel
        if: matrix.platform.target == 'x86_64'
        run: |
          python -m pip install -U pip httpx "pydantic>=2"
          python -m pip install dist/*.whl
          python -c "
          import fastapi_turbo, uuid
          from fastapi import FastAPI
          from fastapi.testclient import TestClient
          marker = str(uuid.uuid4())
          app = FastAPI()
          @app.get('/m')
          def m(): return {'marker': marker}
          with TestClient(app, in_process=True) as c:
              body = c.get('/m').json()
          assert body == {'marker': marker}, body
          print(f'wheel smoke ok: {marker}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist

  # ── Build wheels for macOS (x86_64 + arm64) ──
  macos:
    needs: gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13      # Intel
            target: x86_64
          - runner: macos-14      # Apple Silicon
            target: aarch64
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
      - name: Smoke-test wheel
        run: |
          python -m pip install -U pip httpx "pydantic>=2"
          python -m pip install dist/*.whl
          python -c "
          import fastapi_turbo, uuid
          from fastapi import FastAPI
          from fastapi.testclient import TestClient
          marker = str(uuid.uuid4())
          app = FastAPI()
          @app.get('/m')
          def m(): return {'marker': marker}
          with TestClient(app, in_process=True) as c:
              body = c.get('/m').json()
          assert body == {'marker': marker}, body
          print(f'wheel smoke ok: {marker}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist

  # ── Build wheels for Windows ──
  windows:
    needs: gate
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - name: Smoke-test wheel (PowerShell)
        shell: pwsh
        run: |
          python -m pip install -U pip httpx "pydantic>=2"
          $whl = Get-ChildItem dist\*.whl | Select-Object -First 1
          python -m pip install $whl.FullName
          python -c "import fastapi_turbo, uuid; from fastapi import FastAPI; from fastapi.testclient import TestClient; m=str(uuid.uuid4()); app=FastAPI();
          @app.get('/m')
          def _m(): return {'marker': m}
          with TestClient(app, in_process=True) as c:
              assert c.get('/m').json() == {'marker': m}
          print(f'wheel smoke ok: {m}')"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-py${{ matrix.python }}
          path: dist

  # ── Build source distribution (fallback for exotic platforms) ──
  sdist:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── Publish to PyPI ──
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Only publish on tag push, not workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
