# Build and publish pre-compiled wheels for all platforms.
# Users run `pip install fastapi-turbo` — no Rust toolchain needed.
#
# This is the same pattern used by orjson, pydantic-core, and cryptography.
# maturin builds platform-specific wheels containing the compiled .so/.dylib/.pyd.
#
# Triggers: push a git tag like v0.1.0
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Gate: every wheel-build job below depends on this. The gate
  # matrix covers ALL Python versions we ship wheels for (3.10–3.14)
  # so a version-specific regression never sneaks past a "3.14-only"
  # check. Rust fmt / clippy / tests run once (Python-independent) on
  # the 3.14 leg; we suppress the redundant work on the others.
  gate:
    name: Test + lint gate (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest httpx "pydantic>=2" python-multipart \
                                "websockets>=12" ruff
      - name: Build extension (release) + install editable
        run: maturin develop --release
      - name: cargo fmt --check
        if: matrix.python == '3.14'
        run: cargo fmt --check
      - name: cargo test
        if: matrix.python == '3.14'
        run: cargo test --release
      - name: cargo clippy -- -D warnings
        if: matrix.python == '3.14'
        run: cargo clippy --all-targets --release -- -D warnings
      - name: ruff check
        if: matrix.python == '3.14'
        run: ruff check python/ tests/
      - name: pytest (fast subset, no live WebSocket servers)
        run: pytest tests/ -x -q --ignore=tests/test_websocket.py --ignore=tests/parity
      - name: pytest stress suite
        run: pytest tests/stress -x -q
      - name: Import smoke test (shim parity)
        run: |
          python -c "
          import fastapi_turbo
          from fastapi import FastAPI
          from fastapi.testclient import TestClient, AsyncClient, ASGITransport
          app = FastAPI()
          @app.get('/p')
          def p(): return {'ok': True}
          assert TestClient(app).get('/p').json() == {'ok': True}
          print('smoke ok on py${{ matrix.python }}')
          "

  # ── Build wheels for Linux (x86_64 + aarch64) ──
  linux:
    needs: gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist

  # ── Build wheels for macOS (x86_64 + arm64) ──
  macos:
    needs: gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13      # Intel
            target: x86_64
          - runner: macos-14      # Apple Silicon
            target: aarch64
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist

  # ── Build wheels for Windows ──
  windows:
    needs: gate
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-py${{ matrix.python }}
          path: dist

  # ── Build source distribution (fallback for exotic platforms) ──
  sdist:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── Publish to PyPI ──
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Only publish on tag push, not workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
