# Build and publish pre-compiled wheels for all platforms.
# Users run `pip install fastapi-turbo` — no Rust toolchain needed.
#
# This is the same pattern used by orjson, pydantic-core, and cryptography.
# maturin builds platform-specific wheels containing the compiled .so/.dylib/.pyd.
#
# Triggers: push a git tag like v0.1.0
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Gate: every wheel-build job below depends on this. The gate
  # matrix covers ALL Python versions we ship wheels for (3.10–3.14)
  # so a version-specific regression never sneaks past a "3.14-only"
  # check. Rust fmt / clippy / tests run once (Python-independent) on
  # the 3.14 leg; we suppress the redundant work on the others.
  gate:
    name: Test + lint gate (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install maturin pytest httpx "pydantic>=2" python-multipart \
                                "websockets>=12" ruff
          # Parity gate spawns a STOCK FastAPI subprocess (see
          # tests/parity/conftest.py — uses ``FASTAPI_TURBO_NO_SHIM
          # =1`` + ``import uvicorn``). Real upstream FastAPI +
          # uvicorn must be installed alongside fastapi-turbo so
          # fresh release runners don't fail at parity-process
          # startup. CI runs the same step.
          python -m pip install "fastapi==0.136.0" "uvicorn[standard]>=0.30"
      - name: Build extension (release) + install editable
        run: maturin develop --release
      - name: cargo fmt --check
        if: matrix.python == '3.14'
        run: cargo fmt --check
      - name: cargo test
        if: matrix.python == '3.14'
        run: cargo test --release
      - name: cargo clippy -- -D warnings
        if: matrix.python == '3.14'
        run: cargo clippy --all-targets --release -- -D warnings
      - name: ruff check
        if: matrix.python == '3.14'
        run: ruff check python/ tests/
      - name: pytest (fast subset, no live WebSocket servers)
        run: pytest tests/ -x -q --ignore=tests/test_websocket.py --ignore=tests/parity
      - name: pytest stress suite
        run: pytest tests/stress -x -q
      - name: pytest WebSocket
        # Real-loopback WS protocol tests. Release-required gate per
        # COMPATIBILITY.md: catches handshake / ping-pong / close
        # regressions that the in-process WS path can't reproduce.
        run: pytest tests/test_websocket.py -x -q
      - name: pytest parity (real-loopback, FastAPI 0.136.0 diff)
        # Release-required gate per COMPATIBILITY.md "Release
        # readiness" section. Spawns upstream FastAPI AND turbo as
        # subprocess servers and diffs the responses across 16
        # parity apps. The CI workflow runs this on every PR; the
        # release workflow MUST too — earlier R29 audit caught a
        # tag publish path that bypassed this check.
        run: pytest tests/parity -x -q
      - name: pytest upstream FastAPI suite under shim (3.10 + 3.11 + 3.14)
        # Release-required: the canonical script is the single
        # source of truth (R51 finding 5). Run on:
        #   * 3.14 — latest, where most parity tests are landed first
        #   * 3.11 — common production target
        #   * 3.10 — pyproject.toml floor; without it a Python-
        #     version-specific regression on the floor slips to
        #     release (R52 finding 4 — was previously 3.11+3.14
        #     only).
        if: matrix.python == '3.14' || matrix.python == '3.11' || matrix.python == '3.10'
        run: ./scripts/run_external_compat_gates.sh fastapi
      - name: pytest Sentry SDK FastAPI + ASGI integration (3.11 + 3.14)
        # Release-required: caught the R26 transaction-name
        # regression. Run on 3.14 AND 3.11 — sentry-sdk 2.42.0
        # supports both, and a 3.11-only Sentry transaction-name
        # regression (the bug class R26 caught) would otherwise
        # ship from release with only the 3.14 path covered
        # (R52 finding 4).
        if: matrix.python == '3.14' || matrix.python == '3.11'
        run: ./scripts/run_external_compat_gates.sh sentry
      - name: Import smoke test (shim parity)
        run: |
          python -c "
          import fastapi_turbo
          from fastapi import FastAPI
          from fastapi.testclient import TestClient, AsyncClient, ASGITransport
          app = FastAPI()
          @app.get('/p')
          def p(): return {'ok': True}
          assert TestClient(app).get('/p').json() == {'ok': True}
          print('smoke ok on py${{ matrix.python }}')
          "

  # ── Build wheels for Linux (x86_64 + aarch64) ──
  linux:
    needs: gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      # Linux x86_64: smoke-test the ACTUAL wheel — both in-process
      # AND real Rust loopback (HTTP + WebSocket) so the platform
      # native-extension exercises the same paths as macOS / Windows
      # release jobs (R52 finding 4 — previously in_process=True only).
      - name: Smoke-test wheel x86_64 (in-process + real loopback HTTP + WebSocket)
        if: matrix.platform.target == 'x86_64'
        run: |
          python -m pip install -U pip httpx "pydantic>=2" "websockets>=12"
          python -m pip install dist/*.whl
          python -c "
          import fastapi_turbo, uuid
          from fastapi import FastAPI, WebSocket
          from fastapi.testclient import TestClient
          marker = str(uuid.uuid4())
          app = FastAPI()
          @app.get('/m')
          def m(): return {'marker': marker}
          @app.websocket('/ws')
          async def ws_ep(websocket: WebSocket):
              await websocket.accept()
              await websocket.send_text(f'ws-{marker}')
              await websocket.close()
          with TestClient(app, in_process=True) as c:
              assert c.get('/m').json() == {'marker': marker}
          print(f'in-process smoke ok: {marker}')
          with TestClient(app) as c:
              assert c.get('/m').json() == {'marker': marker}
              with c.websocket_connect('/ws') as ws:
                  assert ws.receive_text() == f'ws-{marker}'
          print(f'loopback smoke ok: {marker}')
          "
      # Linux aarch64: cross-compiled, can't be executed natively on
      # the x86_64 runner. Use docker + qemu-user-static via
      # ``uraimo/run-on-arch-action`` so the cross-built wheel is at
      # least exercised under emulation (R52 finding 4 — previously
      # cross-aarch64 wheels shipped with NO executable smoke test).
      - name: Smoke-test wheel aarch64 (under qemu-user-static)
        if: matrix.platform.target == 'aarch64'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q && apt-get install -y python3 python3-pip
          run: |
            python3 -m pip install -q -U pip httpx "pydantic>=2"
            python3 -m pip install -q dist/*.whl
            python3 -c "
            import fastapi_turbo, uuid
            from fastapi import FastAPI
            from fastapi.testclient import TestClient
            marker = str(uuid.uuid4())
            app = FastAPI()
            @app.get('/m')
            def m(): return {'marker': marker}
            with TestClient(app, in_process=True) as c:
                assert c.get('/m').json() == {'marker': marker}
            print(f'aarch64 in-process smoke ok: {marker}')
            "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist

  # ── Build wheels for macOS (x86_64 + arm64) ──
  macos:
    needs: gate
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13      # Intel
            target: x86_64
          - runner: macos-14      # Apple Silicon
            target: aarch64
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
      - name: Smoke-test wheel (in-process + real loopback HTTP + WebSocket)
        # Audit R51 finding 2: in-process TestClient only verifies
        # native-extension import; it does NOT exercise the
        # platform-specific Axum/Tokio/socket server. Add a real
        # ``app.run()`` HTTP request AND a WebSocket request so
        # platform-specific server-startup / socket binding is
        # actually covered per wheel.
        run: |
          python -m pip install -U pip httpx "pydantic>=2" "websockets>=12"
          python -m pip install dist/*.whl
          python -c "
          import fastapi_turbo, uuid
          from fastapi import FastAPI, WebSocket
          from fastapi.testclient import TestClient
          marker = str(uuid.uuid4())
          app = FastAPI()
          @app.get('/m')
          def m(): return {'marker': marker}
          @app.websocket('/ws')
          async def ws_ep(websocket: WebSocket):
              await websocket.accept()
              await websocket.send_text(f'ws-{marker}')
              await websocket.close()
          # 1. In-process path (sandbox-friendly).
          with TestClient(app, in_process=True) as c:
              body = c.get('/m').json()
          assert body == {'marker': marker}, body
          print(f'in-process smoke ok: {marker}')
          # 2. Real Rust loopback server — HTTP + WebSocket. This is
          # the path that would fail if the wheel's native extension
          # has a platform-specific Tokio / Axum bug. The default
          # path through TestClient (no ``in_process=True``) starts
          # the Rust server on a free loopback port.
          with TestClient(app) as c:
              body = c.get('/m').json()
              assert body == {'marker': marker}, body
              with c.websocket_connect('/ws') as ws:
                  msg = ws.receive_text()
                  assert msg == f'ws-{marker}', msg
          print(f'loopback smoke ok: {marker}')
          "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}-py${{ matrix.python }}
          path: dist

  # ── Build wheels for Windows ──
  windows:
    needs: gate
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - name: Smoke-test wheel — in-process + real loopback HTTP + WebSocket (PowerShell)
        # Audit R51 finding 2: same expansion as the macOS jobs —
        # exercise both the in-process dispatcher AND the real Rust
        # Axum/Tokio loopback server (HTTP + WebSocket).
        shell: pwsh
        run: |
          python -m pip install -U pip httpx "pydantic>=2" "websockets>=12"
          $whl = Get-ChildItem dist\*.whl | Select-Object -First 1
          python -m pip install $whl.FullName
          $code = @'
          import fastapi_turbo, uuid
          from fastapi import FastAPI, WebSocket
          from fastapi.testclient import TestClient
          marker = str(uuid.uuid4())
          app = FastAPI()
          @app.get("/m")
          def m(): return {"marker": marker}
          @app.websocket("/ws")
          async def ws_ep(websocket: WebSocket):
              await websocket.accept()
              await websocket.send_text(f"ws-{marker}")
              await websocket.close()
          with TestClient(app, in_process=True) as c:
              assert c.get("/m").json() == {"marker": marker}
          print(f"in-process smoke ok: {marker}")
          with TestClient(app) as c:
              assert c.get("/m").json() == {"marker": marker}
              with c.websocket_connect("/ws") as ws:
                  assert ws.receive_text() == f"ws-{marker}"
          print(f"loopback smoke ok: {marker}")
          '@
          $code | python -
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-py${{ matrix.python }}
          path: dist

  # ── Build source distribution (fallback for exotic platforms) ──
  sdist:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ── Publish to PyPI ──
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Only publish on tag push, not workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write  # trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
